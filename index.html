<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進貨 Excel 自動比對與預覽工具</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6;}
        .container { max-width: 1000px; margin: auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .step { margin-bottom: 25px; padding: 20px; border-radius: 4px;}
        .step-1-2 { border-left: 5px solid #3498db; background-color: #ebf5fb; }
        .step-3 { border-left: 5px solid #9b59b6; background-color: #f4ecf7; }
        .step-4 { border-left: 5px solid #e67e22; background-color: #fdf2e9; }
        
        .table-wrapper { max-height: 400px; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px; margin-top: 10px; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; border-right: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle;}
        th:last-child, td:last-child { border-right: none; }
        th { background-color: #f2f2f2; color: #333; position: sticky; top: 0; z-index: 1; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.1); }
        
        input[type="text"] { width: 90%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;}
        input[type="date"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; margin-left: 10px; font-family: sans-serif;}
        
        .matched-result { font-weight: bold; color: #7f8c8d; font-size: 15px;}
        .order-result { font-weight: bold; color: #7f8c8d; font-size: 15px;}
        
        .btn-group { margin-top: 10px; text-align: right; }
        .small-btn { background-color: #95a5a6; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 14px;}
        .small-btn:hover { background-color: #7f8c8d; }
        .del-btn { background-color: #e74c3c; color: white; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px;}
        .del-btn:hover { background-color: #c0392b; }

        input[type="file"] { display: block; margin-top: 10px; font-size: 15px;}
        
        .primary-btn { background-color: #3498db; color: white; border: none; padding: 14px 20px; font-size: 18px; cursor: pointer; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 10px;}
        .primary-btn:hover { background-color: #2980b9; }
        .purple-btn { background-color: #8e44ad; }
        .purple-btn:hover { background-color: #9b59b6; }
        .orange-btn { background-color: #e67e22; }
        .orange-btn:hover { background-color: #d35400; }
        
        .export-btn { background-color: #27ae60; color: white; border: none; padding: 14px 20px; font-size: 18px; cursor: pointer; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 15px; display: none;}
        .export-btn:hover { background-color: #2ecc71; }
        
        #status { margin-top: 15px; font-weight: bold; text-align: center; font-size: 16px; white-space: pre-wrap; padding: 10px; border-radius: 4px;}
    </style>
</head>
<body>

<div class="container">
    <h2>📦 採購進貨 Excel 自動比對預覽工具</h2>
    
    <div id="status"></div>

    <div class="step step-1-2">
        <h3>步驟 1：輸入或貼上進貨資料</h3>
        <div class="table-wrapper">
            <table id="inputTable">
                <thead>
                    <tr>
                        <th style="width: 20%;">廠商料號</th>
                        <th style="width: 15%;">數量</th>
                        <th style="width: 25%; background-color: #fff9c4;">對應的商品編號 (預覽)</th>
                        <th style="width: 25%; background-color: #e8daef;">單號 (預覽)</th>
                        <th style="width: 15%;">操作</th>
                    </tr>
                </thead>
                <tbody id="dataBody"></tbody>
            </table>
        </div>
        <div class="btn-group">
            <button class="small-btn" onclick="addRow()">+ 新增一列</button>
            <button class="small-btn" onclick="clearTable()" style="background-color: #e67e22;">清空全部</button>
        </div>
    </div>

    <div class="step step-1-2">
        <h3>步驟 2：上傳對照用的 Excel (總表) 抓取商品編號</h3>
        <p style="color: #555; font-size: 14px;">💡 <strong>提示：</strong>你可以一次選取多個檔案同時匯入比對。</p>
        <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" multiple />
        <button id="matchBtn" class="primary-btn">🔍 載入所有檔案並抓取商品編號</button>
        <button id="exportBtn2" class="export-btn">⬇️ 步驟 2 完成：匯出包含【商品編號】的 Excel</button>
    </div>

    <div class="step step-3">
        <h3>步驟 3 (選用)：上傳單號 Excel 抓取對應單號</h3>
        <input type="file" id="step3FileInput" accept=".xlsx, .xls, .csv" />
        <button id="step3MatchBtn" class="primary-btn purple-btn">🏷️ 載入檔案並抓取單號</button>
        <button id="exportBtn3" class="export-btn">⬇️ 步驟 3 完成：匯出包含【單號】的最終 Excel</button>
    </div>

    <div class="step step-4">
        <h3>步驟 4 (選用)：產生預約進貨單</h3>
        <p style="color: #555; font-size: 14px;">請選擇進貨日期，系統將抓取上方的【單號】與【數量】。</p>
        <div style="margin-top: 15px; margin-bottom: 15px; font-weight: bold; color: #333;">
            <label for="appointmentDate">📅 預約進貨日：</label>
            <input type="date" id="appointmentDate" />
        </div>
        <button id="exportBtn4" class="primary-btn orange-btn">⬇️ 產生並匯出【預約進貨單】</button>
    </div>

</div>

<script>
    let finalExportData = [];

    function setStatus(text, color, bgColor = 'transparent') {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = text;
        statusDiv.style.color = color;
        statusDiv.style.backgroundColor = bgColor;
    }

    function hideAllExportButtons() {
        document.getElementById('exportBtn2').style.display = 'none';
        document.getElementById('exportBtn3').style.display = 'none';
    }

    function addRow() {
        const tbody = document.getElementById('dataBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="part-no"></td>
            <td><input type="text" class="qty"></td>
            <td><span class="matched-result">- 尚未比對 -</span></td>
            <td><span class="order-result">-</span></td>
            <td><button class="del-btn" onclick="removeRow(this)">刪除</button></td>
        `;
        tbody.appendChild(tr);
        return tr;
    }

    function removeRow(btn) {
        btn.closest('tr').remove();
        hideAllExportButtons();
        setStatus('⚠️ 資料已變更，請重新比對。', '#e67e22', '#fdf2e9');
    }

    function clearTable() {
        document.getElementById('dataBody').innerHTML = '';
        addRow(); 
        hideAllExportButtons();
        setStatus('', 'transparent');
    }

    for(let i=0; i<5; i++) addRow();

    // 貼上與輸入監聽 (不變)
    document.getElementById('dataBody').addEventListener('paste', function(e) {
        if (e.target.tagName !== 'INPUT') return;
        e.preventDefault(); 
        const text = (e.clipboardData || window.clipboardData).getData('text');
        if (!text) return;
        const rows = text.split(/\r?\n/);
        const targetInput = e.target;
        const isPartNo = targetInput.classList.contains('part-no');
        const isQty = targetInput.classList.contains('qty');
        let currentRow = targetInput.closest('tr');

        rows.forEach(rowText => {
            if (rowText.trim() === '') return; 
            if (!currentRow) currentRow = addRow();
            const cols = rowText.split(/\t/);
            if (isPartNo) {
                currentRow.querySelector('.part-no').value = cols[0].trim();
                if (cols[1]) currentRow.querySelector('.qty').value = cols[1].trim();
            } else if (isQty) {
                currentRow.querySelector('.qty').value = cols[0].trim();
            }
            currentRow.querySelector('.matched-result').innerText = '- 尚未比對 -';
            currentRow.querySelector('.matched-result').style.color = '#7f8c8d';
            currentRow.querySelector('.order-result').innerText = '-';
            currentRow.querySelector('.order-result').style.color = '#7f8c8d';
            delete currentRow.dataset.matchedId; 
            currentRow = currentRow.nextElementSibling;
        });
        hideAllExportButtons();
        setStatus('💡 資料已更新，請重新比對。', '#3498db', '#ebf5fb');
    });

    document.getElementById('dataBody').addEventListener('input', function(e) {
        if (e.target.tagName === 'INPUT') {
            const tr = e.target.closest('tr');
            tr.querySelector('.matched-result').innerText = '- 尚未比對 -';
            tr.querySelector('.matched-result').style.color = '#7f8c8d';
            tr.querySelector('.order-result').innerText = '-';
            tr.querySelector('.order-result').style.color = '#7f8c8d';
            delete tr.dataset.matchedId;
            hideAllExportButtons();
            setStatus('⚠️ 資料已修改，請重新比對。', '#e67e22', '#fdf2e9');
        }
    });

    // --- 步驟 2：核心修改 - 同時匯入多個檔案 ---
    document.getElementById('matchBtn').addEventListener('click', function() {
        hideAllExportButtons();
        const fileInput = document.getElementById('fileInput');
        const files = fileInput.files;

        if (files.length === 0) {
            setStatus("⚠️ 請先選擇要匯入的 Excel 總表！", "#c0392b", '#fdedec');
            return;
        }

        setStatus(`正在讀取並合併 ${files.length} 個檔案...`, "#333");

        const lookupMap = {};
        const filePromises = [];
        let validFilesCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const promise = new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const excelData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
                        
                        if (excelData.length > 0) {
                            const headers = Object.keys(excelData[0]);
                            const partNoKey = headers.find(k => k.includes('廠商料號') || k.includes('料號'));
                            const prodIdKey = headers.find(k => k.includes('商品編號') || k.includes('商品ID'));

                            if (partNoKey && prodIdKey) {
                                validFilesCount++;
                                excelData.forEach(row => {
                                    const partNo = row[partNoKey];
                                    const prodId = row[prodIdKey];
                                    if (partNo !== undefined && partNo !== "" && prodId !== undefined) {
                                        const cleanPartNo = String(partNo).replace(/\s+/g, '').toUpperCase();
                                        lookupMap[cleanPartNo] = String(prodId).trim();
                                    }
                                });
                            }
                        }
                    } catch (err) { console.error("檔案讀取出錯:", err); }
                    resolve();
                };
                reader.readAsArrayBuffer(file);
            });
            filePromises.push(promise);
        }

        Promise.all(filePromises).then(() => {
            if (validFilesCount === 0) {
                setStatus("⚠️ 所選檔案中皆找不到正確的標題欄位！", "#c0392b", '#fdedec');
                return;
            }

            let notFoundCount = 0;
            finalExportData = []; 
            const trs = document.querySelectorAll('#dataBody tr');

            trs.forEach(tr => {
                const pInput = tr.querySelector('.part-no').value.trim();
                const qInput = tr.querySelector('.qty').value.trim();
                const matchedSpan = tr.querySelector('.matched-result');

                if (pInput === '') { matchedSpan.innerText = '-'; return; }

                const searchKey = String(pInput).replace(/\s+/g, '').toUpperCase();
                const matchedId = lookupMap[searchKey];

                if (matchedId) {
                    matchedSpan.innerText = `✅ ${matchedId}`;
                    matchedSpan.style.color = "#27ae60"; 
                    tr.dataset.matchedId = matchedId; 
                } else {
                    matchedSpan.innerText = `❌ 找不到`;
                    matchedSpan.style.color = "#e74c3c"; 
                    delete tr.dataset.matchedId;
                    notFoundCount++;
                }

                finalExportData.push({ '商品編號': matchedId || '⚠️找不到', '數量': qInput, '採購進貨成本': '' });
            });

            setStatus(`✅ 成功匯入並合併 ${validFilesCount} 個檔案！\n${notFoundCount > 0 ? '有 ' + notFoundCount + ' 筆料號未找到。' : '所有料號皆已配對成功。'}`, "#27ae60", '#eafaf1');
            document.getElementById('exportBtn2').style.display = "block";
        });
    });

    // --- 步驟 3：抓單號 (不變) ---
    document.getElementById('step3MatchBtn').addEventListener('click', function() {
        if (finalExportData.length === 0) { setStatus("⚠️ 請先完成步驟 2！", "#c0392b", '#fdedec'); return; }
        const fileInput = document.getElementById('step3FileInput');
        if (fileInput.files.length === 0) { setStatus("⚠️ 請上傳單號 Excel！", "#c0392b", '#fdedec'); return; }

        setStatus("比對單號中...", "#333");
        document.getElementById('exportBtn2').style.display = 'none';

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const excelData = XLSX.utils.sheet_to_json(firstSheet, { defval: "" });
                
                const headers = Object.keys(excelData[0]);
                const orderNoKey = headers.find(k => k.includes('單號') || k.includes('訂單編號'));
                const prodIdKey = headers.find(k => k.includes('商品編號') || k.includes('商品ID'));

                if (!orderNoKey || !prodIdKey) { setStatus("⚠️ 找不到單號或商品編號欄位！", "#c0392b", '#fdedec'); return; }

                const lookupMap3 = {};
                excelData.forEach(row => {
                    const orderNo = row[orderNoKey];
                    const prodId = row[prodIdKey];
                    if (prodId && orderNo) {
                        const cleanProdId = String(prodId).replace(/\s+/g, '').toUpperCase();
                        if (!lookupMap3[cleanProdId]) lookupMap3[cleanProdId] = String(orderNo).trim();
                    }
                });

                const trs = document.querySelectorAll('#dataBody tr');
                let dataIndex = 0; 
                let notFoundOrderCount = 0;

                trs.forEach(tr => {
                    const pInput = tr.querySelector('.part-no').value.trim();
                    if (pInput === '') return; 
                    const matchedId = tr.dataset.matchedId; 
                    const orderSpan = tr.querySelector('.order-result');

                    if (matchedId) {
                        const orderNo = lookupMap3[String(matchedId).replace(/\s+/g, '').toUpperCase()];
                        if (orderNo) {
                            orderSpan.innerText = `✅ ${orderNo}`;
                            orderSpan.style.color = "#8e44ad"; 
                            finalExportData[dataIndex]['單號'] = orderNo; 
                        } else {
                            orderSpan.innerText = `❌ 找不到單號`;
                            orderSpan.style.color = "#e74c3c";
                            finalExportData[dataIndex]['單號'] = ''; 
                            notFoundOrderCount++;
                        }
                    }
                    dataIndex++;
                });
                setStatus(`🎉 步驟 3 比對完成！${notFoundOrderCount > 0 ? '有 ' + notFoundOrderCount + ' 筆找不到單號。' : ''}`, "#8e44ad", '#f4ecf7');
                document.getElementById('exportBtn3').style.display = "block";
            } catch (error) { setStatus("⚠️ 檔案處理出錯。", "#c0392b", '#fdedec'); }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    });

    // --- 匯出功能 (不變) ---
    function exportExcel() {
        if (finalExportData.length === 0) return;
        const newSheet = XLSX.utils.json_to_sheet(finalExportData);
        const newWorkbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(newWorkbook, newSheet, "進貨清單");
        XLSX.writeFile(newWorkbook, "進貨匯出結果.xlsx");
    }

    document.getElementById('exportBtn2').addEventListener('click', exportExcel);
    document.getElementById('exportBtn3').addEventListener('click', exportExcel);

    // --- 步驟 4：預約進貨單 (不變) ---
    document.getElementById('exportBtn4').addEventListener('click', function() {
        const dateInput = document.getElementById('appointmentDate').value;
        if (!dateInput) { setStatus("⚠️ 請先選擇預約進貨日！", "#c0392b", '#fdedec'); return; }
        const formattedDate = dateInput.replace(/-/g, '/');
        const step4ExportData = [];
        const trs = document.querySelectorAll('#dataBody tr');

        trs.forEach(tr => {
            const partNo = tr.querySelector('.part-no').value.trim();
            if (partNo === '') return;
            const qty = tr.querySelector('.qty').value.trim();
            const orderSpanText = tr.querySelector('.order-result').innerText;
            let finalOrderNo = orderSpanText.startsWith('✅') ? orderSpanText.replace('✅', '').trim() : '找不到單號';
            step4ExportData.push({ '進貨單號': finalOrderNo, '預約進貨日': formattedDate, '預約進貨數': qty, '超額說明': '新品' });
        });

        const newSheet = XLSX.utils.json_to_sheet(step4ExportData);
        const newWorkbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(newWorkbook, newSheet, "預約進貨單");
        XLSX.writeFile(newWorkbook, `預約進貨單_${formattedDate.replace(/\//g, '')}.xlsx`);
    });
</script>

</body>
</html>
